server.port=8086

spring.application.name=payment-service

#postgres
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/bookstore_db
spring.datasource.username=postgres
spring.datasource.password=postgres

#flyway
spring.flyway.enabled=true
spring.flyway.schemas=svc_payment
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

#jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=svc_payment
spring.datasource.hikari.connection-init-sql=SET search_path TO svc_payment

#Kafka
spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=payment-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=com.bookstore.orderservice.event.OrderCreatedEvent:com.bookstore.paymentservice.event.OrderCreatedEvent,\
  com.bookstore.orderservice.event.DeliveryConfirmedEvent:com.bookstore.paymentservice.event.DeliveryConfirmedEvent,\
  com.bookstore.storeservice.event.StoreCreatedEvent:com.bookstore.paymentservice.event.StoreCreatedEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.bookstore.*

#keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/bookstore-realm/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/bookstore-realm

# Stripe
stripe.secret-key=${SECRET_KEY}
stripe.webhook-secret=${WEBHOOK_SECRET}
stripe.client=${STRIPE_CLIENT}
server.tomcat.relaxed-path-chars=|,{,},[,]

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true