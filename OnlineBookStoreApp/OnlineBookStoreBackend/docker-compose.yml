version: '3.8'

services:

  bookstore-postgres:
    image: postgres:16
    container_name: bookstore-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:Z
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: bookstore-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - bookstore-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: bookstore-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://bookstore-postgres:5432/keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres

      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - bookstore-network
    depends_on:
      bookstore-postgres:
        condition: service_healthy


  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: bookstore-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bookstore-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bookstore-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - bookstore-network
    depends_on:
      - zookeeper

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - bookstore-network
    depends_on:
      bookstore-postgres:
        condition: service_healthy


  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://bookstore-postgres:5432/bookstore_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=bookstore-kafka:29092
    networks:
      - bookstore-network
    depends_on:
      bookstore-postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started


  store-service:
    build: ./store-service
    container_name: store-service
    ports:
      - "8082:8082" 
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=bookstore-kafka:29092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://bookstore-postgres:5432/bookstore_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    networks:
      - bookstore-network
    depends_on:
      bookstore-postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-service:
        condition: service_started


  book-service:
    build: ./book-service
    container_name: book-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://bookstore-postgres:5432/bookstore_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    networks:
      - bookstore-network
    depends_on:
      bookstore-postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started


networks:
  bookstore-network:
    driver: bridge


volumes:
  postgres_data:
  keycloak_data:
  minio_data: