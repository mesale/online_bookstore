server.port=8081
spring.application.name=user-service

#postgres
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/bookstore_db
spring.datasource.username=postgres
spring.datasource.password=postgres

#flyway
spring.flyway.enabled=true
spring.flyway.schemas=svc_user
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

#jpa
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=svc_user
spring.datasource.hikari.connection-init-sql=SET search_path TO svc_user

#keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://bookstore-keycloak:8080/realms/bookstore-realm/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/bookstore-realm
keycloak.url=http://bookstore-keycloak:8080
keycloak.realm=bookstore-realm
keycloak.admin-client-id=bookstore-backend
keycloak.admin-client-secret=IGxyl7WDzZRfEnpNJnVGI1RHwF2G8xDG

#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/